<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validação de Materiais — Painel do Analista</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d27;
  --bg-card: #21242f;
  --bg-card-hover: #282c3a;
  --border: #2d3142;
  --border-active: #4f46e5;
  --text-primary: #e8eaed;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --accent: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.15);
  --ok: #22c55e;
  --ok-bg: rgba(34, 197, 94, 0.12);
  --warn: #f59e0b;
  --warn-bg: rgba(245, 158, 11, 0.12);
  --danger: #ef4444;
  --danger-bg: rgba(239, 68, 68, 0.12);
  --info: #3b82f6;
  --info-bg: rgba(59, 130, 246, 0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

/* ─── Header ─────────────────────────────────────────── */
.header {
  background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(20px);
}
.header-inner {
  max-width: 1600px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 16px;
}
.header h1 {
  font-size: 1.4rem; font-weight: 700;
  background: linear-gradient(135deg, #818cf8, #6366f1);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.header-subtitle {
  font-size: 0.82rem; color: var(--text-muted); font-weight: 400;
}
.header-actions { display: flex; gap: 10px; align-items: center; }

/* ─── Buttons ────────────────────────────────────────── */
.btn {
  padding: 8px 18px; border-radius: var(--radius-sm);
  font-size: 0.82rem; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg-card);
  color: var(--text-primary); transition: all var(--transition);
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { background: var(--bg-card-hover); border-color: var(--accent); }
.btn-primary {
  background: var(--accent); border-color: var(--accent); color: white;
}
.btn-primary:hover { background: #4f46e5; box-shadow: 0 0 20px var(--accent-glow); }
.btn-sm { padding: 5px 12px; font-size: 0.75rem; border-radius: 6px; }
.btn-ok { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }
.btn-warn { background: var(--warn-bg); border-color: var(--warn); color: var(--warn); }
.btn-danger { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }

/* ─── Stats Bar ──────────────────────────────────────── */
.stats-bar {
  max-width: 1600px; margin: 20px auto 0; padding: 0 32px;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px;
}
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  display: flex; flex-direction: column; gap: 4px;
  transition: all var(--transition);
}
.stat-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.stat-card .value { font-size: 1.6rem; font-weight: 800; }
.stat-card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-ok .value { color: var(--ok); }
.stat-warn .value { color: var(--warn); }
.stat-total .value { color: var(--accent); }

/* ─── Filters ────────────────────────────────────────── */
.filters {
  max-width: 1600px; margin: 16px auto 0; padding: 0 32px;
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
}
.search-box {
  flex: 1; min-width: 250px; position: relative;
}
.search-box input {
  width: 100%; padding: 10px 16px 10px 40px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-size: 0.85rem; font-family: inherit; outline: none;
  transition: border-color var(--transition);
}
.search-box input:focus { border-color: var(--accent); }
.search-box::before {
  content: '🔍'; position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%); font-size: 0.85rem;
}
.filter-select {
  padding: 10px 14px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-primary); font-size: 0.82rem; font-family: inherit;
  cursor: pointer; outline: none;
}
.filter-select:focus { border-color: var(--accent); }
.filter-chip {
  padding: 6px 14px; border-radius: 20px; font-size: 0.78rem;
  font-weight: 600; cursor: pointer; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-secondary);
  transition: all var(--transition); user-select: none;
}
.filter-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
.filter-chip:hover { border-color: var(--accent); }

/* ─── Main Content ───────────────────────────────────── */
.main { max-width: 1600px; margin: 0 auto; padding: 20px 32px 60px; }
.results-info {
  font-size: 0.82rem; color: var(--text-muted); margin-bottom: 12px;
  display: flex; justify-content: space-between; align-items: center;
}

/* ─── Material Cards ─────────────────────────────────── */
.material-list { display: flex; flex-direction: column; gap: 10px; }

.material-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  transition: all var(--transition);
}
.material-card:hover { border-color: #3d4155; }
.material-card.expanded { border-color: var(--accent); box-shadow: 0 0 30px var(--accent-glow); }
.material-card.reviewed { opacity: 0.6; }
.material-card.reviewed .card-header { background: rgba(34,197,94,0.05); }

.card-header {
  padding: 14px 20px; display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: background var(--transition);
  flex-wrap: wrap;
}
.card-header:hover { background: var(--bg-card-hover); }

.badge {
  padding: 4px 10px; border-radius: 6px; font-size: 0.72rem;
  font-weight: 700; letter-spacing: 0.3px; white-space: nowrap;
  flex-shrink: 0;
}
.badge-ok { background: var(--ok-bg); color: var(--ok); border: 1px solid rgba(34,197,94,0.3); }
.badge-warn { background: var(--warn-bg); color: var(--warn); border: 1px solid rgba(245,158,11,0.3); }

.card-codigo { font-weight: 700; font-size: 0.9rem; color: var(--text-primary); min-width: 110px; }
.card-desc { font-size: 0.82rem; color: var(--text-secondary); flex: 1; min-width: 200px; }
.card-resp {
  font-size: 0.72rem; color: var(--text-muted); background: var(--bg-primary);
  padding: 3px 10px; border-radius: 6px; font-weight: 600;
}
.card-grpm {
  font-size: 0.72rem; color: var(--text-muted);
  padding: 3px 8px; border-radius: 4px; background: rgba(99,102,241,0.08);
}
.card-expand { margin-left: auto; color: var(--text-muted); font-size: 0.85rem; transition: transform var(--transition); }
.expanded .card-expand { transform: rotate(180deg); }

/* ─── Card Body (expanded) ───────────────────────────── */
.card-body {
  display: none; padding: 0 20px 20px;
  border-top: 1px solid var(--border);
}
.expanded .card-body { display: block; }

.issues-section {
  background: var(--bg-primary); border-radius: var(--radius-sm);
  padding: 14px 18px; margin-top: 14px;
}
.issues-section h4 {
  font-size: 0.78rem; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
}
.issue-line {
  font-size: 0.85rem; color: var(--text-secondary); padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex; gap: 8px; align-items: flex-start;
  line-height: 1.5;
}
.issue-line:last-child { border-bottom: none; }
.issue-tag {
  font-size: 0.68rem; font-weight: 700; padding: 2px 6px;
  border-radius: 4px; flex-shrink: 0; margin-top: 2px;
}
.tag-LT { background: rgba(239,68,68,0.15); color: #f87171; }
.tag-GRPM { background: rgba(245,158,11,0.15); color: #fbbf24; }
.tag-TXT { background: rgba(99,102,241,0.15); color: #a5b4fc; }
.tag-OBS { background: rgba(168,85,247,0.15); color: #c084fc; }
.tag-REF { background: rgba(59,130,246,0.15); color: #93c5fd; }
.tag-IMG { background: rgba(236,72,153,0.15); color: #f9a8d4; }
.tag-DOC { background: rgba(20,184,166,0.15); color: #5eead4; }

.detail-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px; margin-top: 14px;
}
.detail-block {
  background: var(--bg-primary); border-radius: var(--radius-sm);
  padding: 14px 18px;
}
.detail-block h4 {
  font-size: 0.72rem; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px;
}
.detail-row {
  display: flex; gap: 8px; padding: 3px 0; font-size: 0.8rem;
}
.detail-label { color: var(--text-muted); min-width: 130px; flex-shrink: 0; font-weight: 500; }
.detail-value { color: var(--text-primary); word-break: break-word; }
.detail-value a { color: var(--info); text-decoration: none; }
.detail-value a:hover { text-decoration: underline; }

/* ─── Actions Row ────────────────────────────────────── */
.actions-row {
  display: flex; gap: 8px; margin-top: 16px; padding-top: 14px;
  border-top: 1px solid var(--border); flex-wrap: wrap; align-items: center;
}
.action-note {
  flex: 1; min-width: 200px;
}
.action-note input {
  width: 100%; padding: 8px 14px; background: var(--bg-primary);
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-primary); font-size: 0.82rem; font-family: inherit;
  outline: none;
}
.action-note input:focus { border-color: var(--accent); }

/* ─── Empty / Loading ────────────────────────────────── */
.empty-state {
  text-align: center; padding: 80px 20px; color: var(--text-muted);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
.empty-state h3 { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 8px; }

/* ─── Scrollbar ──────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #4a4e5e; }

/* ─── Toast ──────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  background: var(--bg-card); border: 1px solid var(--ok);
  border-radius: var(--radius-sm); padding: 12px 20px;
  color: var(--ok); font-size: 0.85rem; font-weight: 600;
  box-shadow: var(--shadow); transform: translateY(100px); opacity: 0;
  transition: all 0.3s ease;
}
.toast.show { transform: translateY(0); opacity: 1; }

@media (max-width: 768px) {
  .header { padding: 14px 16px; }
  .stats-bar, .filters, .main { padding-left: 16px; padding-right: 16px; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .detail-grid { grid-template-columns: 1fr; }
  .card-header { gap: 8px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div>
      <h1>📋 Painel de Validação de Materiais</h1>
      <span class="header-subtitle" id="genDate"></span>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="expandAll()">📂 Expandir Tudo</button>
      <button class="btn" onclick="collapseAll()">📁 Recolher Tudo</button>
      <button class="btn btn-primary" onclick="exportDecisions()">📥 Exportar Decisões</button>
    </div>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="filters">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Buscar por código, descrição, PN..." oninput="applyFilters()">
  </div>
  <select class="filter-select" id="filterResp" onchange="applyFilters()">
    <option value="">Todos os responsáveis</option>
  </select>
  <select class="filter-select" id="filterGrupo" onchange="applyFilters()">
    <option value="">Todos os grupos MRP</option>
  </select>
  <div style="display:flex; gap:6px;">
    <span class="filter-chip" data-filter="all" onclick="setClassFilter(this)">Todos</span>
    <span class="filter-chip active" data-filter="REVISAR" onclick="setClassFilter(this)">⚠️ Revisar</span>
    <span class="filter-chip" data-filter="OK" onclick="setClassFilter(this)">✅ OK</span>
  </div>
</div>

<div class="main">
  <div class="results-info">
    <span id="resultCount"></span>
    <span id="reviewedCount"></span>
  </div>
  <div class="material-list" id="materialList"></div>
</div>

<div class="toast" id="toast"></div>

<script src="dashboard_data.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════
const DATA = window.PIPELINE_DATA || [];
let classFilter = 'REVISAR';
let decisions = {};  // { Codigo_Material: { action: 'APROVAR'|'REJEITAR'|'PENDENTE', note: '' } }

// Try to load saved decisions from localStorage
try {
  const saved = localStorage.getItem('validacao_decisions');
  if (saved) decisions = JSON.parse(saved);
} catch(e) {}

// ═══════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════
function init() {
  document.getElementById('genDate').textContent =
    `Dados carregados: ${DATA.length} materiais`;

  // Populate filter dropdowns
  const resps = [...new Set(DATA.map(d => d.Responsavel).filter(Boolean))].sort();
  const fResp = document.getElementById('filterResp');
  resps.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; fResp.appendChild(o); });

  const grupos = [...new Set(DATA.map(d => d.Grupo_MRP || d.Grupo_Mercadoria).filter(Boolean))].sort();
  const fGrupo = document.getElementById('filterGrupo');
  grupos.forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = g; fGrupo.appendChild(o); });

  renderStats();
  applyFilters();
}

// ═══════════════════════════════════════════════════════════
// Stats
// ═══════════════════════════════════════════════════════════
function renderStats() {
  const total = DATA.length;
  const ok = DATA.filter(d => getClass(d) === 'OK').length;
  const warn = DATA.filter(d => getClass(d) === 'REVISAR').length;
  const reviewed = Object.values(decisions).filter(d => d.action !== 'PENDENTE').length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card stat-total"><span class="value">${total}</span><span class="label">Total de Materiais</span></div>
    <div class="stat-card stat-warn"><span class="value">${warn}</span><span class="label">⚠️ Revisar</span></div>
    <div class="stat-card stat-ok"><span class="value">${ok}</span><span class="label">✅ OK</span></div>
    <div class="stat-card"><span class="value" style="color:var(--ok)">${reviewed}/${total}</span><span class="label">Revisados</span></div>
  `;
}

// ═══════════════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════════════
function getClass(d) {
  const c = (d.classificacao_validacao || '').toUpperCase();
  if (c.includes('REVISAR')) return 'REVISAR';
  return 'OK';
}

function getBadgeClass(cls) {
  return cls === 'REVISAR' ? 'badge-warn' : 'badge-ok';
}

function getBadgeLabel(cls) {
  return cls === 'REVISAR' ? '⚠️ REVISAR' : '✅ OK';
}

function escHtml(s) {
  if (s == null || s === '') return '<span style="color:var(--text-muted)">—</span>';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function linkify(s) {
  if (!s) return '—';
  return String(s).split('\n').map(line => {
    const trimmed = line.trim();
    if (trimmed.match(/^https?:\/\//)) return `<a href="${trimmed}" target="_blank" rel="noopener">${trimmed}</a>`;
    return escHtml(trimmed);
  }).join('<br>');
}

function parseIssueTag(line) {
  const m = line.match(/^\[(\w+)\]\s*(.*)/);
  if (m) return { tag: m[1], text: m[2] };
  return { tag: '', text: line };
}

// ═══════════════════════════════════════════════════════════
// Filters
// ═══════════════════════════════════════════════════════════
function setClassFilter(el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  classFilter = el.dataset.filter;
  applyFilters();
}

function applyFilters() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const resp = document.getElementById('filterResp').value;
  const grupo = document.getElementById('filterGrupo').value;

  let filtered = DATA.filter(d => {
    if (classFilter !== 'all' && getClass(d) !== classFilter) return false;
    if (resp && d.Responsavel !== resp) return false;
    if (grupo && (d.Grupo_MRP || d.Grupo_Mercadoria) !== grupo) return false;
    if (search) {
      const hay = [d.Codigo_Material, d.Texto_Breve_Material, d.Numero_Peca_Fabricante,
                    d.Texto_PT, d.resumo_validacao].map(v => String(v||'').toLowerCase()).join(' ');
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  // Sort: REVISAR first, then OK
  const order = {'REVISAR': 0, 'OK': 1};
  filtered.sort((a, b) => {
    const ca = order[getClass(a)] ?? 1, cb = order[getClass(b)] ?? 1;
    return ca - cb;
  });

  renderList(filtered);
}

// ═══════════════════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════════════════
function renderList(items) {
  const container = document.getElementById('materialList');
  document.getElementById('resultCount').textContent = `${items.length} materiais encontrados`;
  const reviewed = Object.values(decisions).filter(d => d.action !== 'PENDENTE').length;
  document.getElementById('reviewedCount').textContent = `${reviewed} revisados`;

  if (!items.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <h3>Nenhum material encontrado</h3>
        <p>Tente ajustar os filtros de busca.</p>
      </div>`;
    return;
  }

  container.innerHTML = items.map(d => {
    const cls = getClass(d);
    const dec = decisions[d.Codigo_Material] || { action: 'PENDENTE', note: '' };
    const isReviewed = dec.action !== 'PENDENTE';
    const resumo = (d.resumo_validacao || '').trim();
    const issues = resumo ? resumo.split('\n').filter(l => l.trim()) : [];

    return `
    <div class="material-card${isReviewed ? ' reviewed' : ''}" id="card-${d.Codigo_Material}">
      <div class="card-header" onclick="toggleCard('${d.Codigo_Material}')">
        <span class="badge ${getBadgeClass(cls)}">${getBadgeLabel(cls)}</span>
        <span class="card-codigo">${d.Codigo_Material || '—'}</span>
        <span class="card-desc">${escHtml(d.Texto_Breve_Material)}</span>
        <span class="card-grpm">${escHtml(d.Grupo_Mercadoria)}</span>
        <span class="card-resp">${d.Responsavel || '—'}</span>
        ${isReviewed ? `<span class="badge badge-ok" style="font-size:0.68rem">✓ ${dec.action}</span>` : ''}
        <span class="card-expand">▼</span>
      </div>
      <div class="card-body">
        ${issues.length ? `
        <div class="issues-section">
          <h4>Problemas Identificados (${issues.length})</h4>
          ${issues.map(line => {
            const {tag, text} = parseIssueTag(line);
            return `<div class="issue-line">
              ${tag ? `<span class="issue-tag tag-${tag}">${tag}</span>` : ''}
              <span>${escHtml(text)}</span>
            </div>`;
          }).join('')}
        </div>` : '<div class="issues-section"><h4>✅ Nenhum problema identificado</h4></div>'}



        <div class="actions-row">
          <div class="action-note">
            <input type="text" placeholder="Anotação do analista..." value="${escHtml(dec.note).replace(/"/g,'&quot;')}"
              oninput="saveNote('${d.Codigo_Material}', this.value)">
          </div>
          <button class="btn btn-sm btn-ok" onclick="setAction('${d.Codigo_Material}','APROVAR')">✓ Aprovar</button>
          <button class="btn btn-sm btn-warn" onclick="setAction('${d.Codigo_Material}','ANALISAR')">⏳ Analisar</button>
          <button class="btn btn-sm btn-danger" onclick="setAction('${d.Codigo_Material}','REJEITAR')">✗ Rejeitar</button>
          <button class="btn btn-sm" onclick="setAction('${d.Codigo_Material}','PENDENTE')">↩ Limpar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// Interactions
// ═══════════════════════════════════════════════════════════
function toggleCard(codigo) {
  const el = document.getElementById('card-' + codigo);
  if (el) el.classList.toggle('expanded');
}

function expandAll() {
  document.querySelectorAll('.material-card').forEach(c => c.classList.add('expanded'));
}
function collapseAll() {
  document.querySelectorAll('.material-card').forEach(c => c.classList.remove('expanded'));
}

function setAction(codigo, action) {
  if (!decisions[codigo]) decisions[codigo] = { action: 'PENDENTE', note: '' };
  decisions[codigo].action = action;
  saveDecisions();
  renderStats();
  applyFilters();
  showToast(`${codigo}: ${action}`);
}

function saveNote(codigo, note) {
  if (!decisions[codigo]) decisions[codigo] = { action: 'PENDENTE', note: '' };
  decisions[codigo].note = note;
  saveDecisions();
}

function saveDecisions() {
  try { localStorage.setItem('validacao_decisions', JSON.stringify(decisions)); } catch(e) {}
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════════════════════
// Export
// ═══════════════════════════════════════════════════════════
function exportDecisions() {
  const rows = DATA.map(d => {
    const dec = decisions[d.Codigo_Material] || { action: 'PENDENTE', note: '' };
    return [
      d.Codigo_Material || '',
      d.Texto_Breve_Material || '',
      d.Responsavel || '',
      d.Grupo_Mercadoria || '',
      getClass(d),
      dec.action,
      dec.note,
      (d.resumo_validacao || '').replace(/\n/g, ' | '),
      d.grpm_decisao_llm || '',
      d.grpm_novo_codigo || '',
      d.img_qualidade || '',
    ];
  });

  const header = [
    'Codigo_Material', 'Texto_Breve', 'Responsavel', 'Grupo_Mercadoria',
    'Classificacao', 'Decisao_Analista', 'Nota_Analista',
    'Resumo_Validacao', 'GRPM_Decisao', 'GRPM_Novo', 'Img_Qualidade'
  ];

  const csvContent = [header, ...rows]
    .map(row => row.map(cell => '"' + String(cell).replace(/"/g, '""') + '"').join(';'))
    .join('\n');

  const BOM = '\uFEFF';
  const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `decisoes_validacao_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📥 CSV exportado com sucesso!');
}

// ═══════════════════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', init);
</script>
